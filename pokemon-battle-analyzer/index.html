<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宝可梦冠军 · 对战分析工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 顶部导航 -->
<header class="app-header">
  <div class="app-logo">
    <span>⚔️</span>
    宝可梦冠军分析
  </div>
  <nav class="app-nav">
    <button class="nav-btn active" data-page="team" onclick="switchPage('team')">🎒 队伍配置</button>
    <button class="nav-btn" data-page="battle" onclick="switchPage('battle')">⚡ 对战分析</button>
  </nav>
  <div class="header-right">
    <div class="team-select-group">
      <label class="form-label" style="margin:0; white-space:nowrap">当前队伍：</label>
      <select id="team-selector" class="form-select" style="width:140px" onchange="loadTeam(this.value)"></select>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="showSaveTeamDialog()">💾 保存</button>
    <button class="btn btn-secondary btn-sm" onclick="showNewTeamDialog()">＋ 新建</button>
  </div>
</header>

<!-- Toast容器 -->
<div class="toast-container" id="toast-container"></div>

<!-- 主内容 -->
<main class="main-content">

  <!-- ====== 队伍配置页 ====== -->
  <div id="page-team" class="page active">
    <div class="team-page-header">
      <h2 style="font-size:1.1rem; font-weight:700;">我的队伍</h2>
      <span id="team-name-display" style="color:var(--text-secondary); font-size:0.9rem;"></span>
    </div>
    <div class="pokemon-slots" id="pokemon-slots-container">
      <!-- 6个宝可梦槽位由JS渲染 -->
    </div>
  </div>

  <!-- ====== 对战分析页 ====== -->
  <div id="page-battle" class="page">

    <!-- 场地/天气状态栏 -->
    <div class="field-bar" id="field-bar">
      <div class="field-group">
        <span class="field-label">☁️ 天气</span>
        <select class="field-select" id="weather-select" onchange="onFieldChange()">
          <option value="none">无特殊天气</option>
          <option value="sun">日照强烈</option>
          <option value="rain">降雨</option>
          <option value="sandstorm">沙暴</option>
          <option value="hail">冰雹</option>
        </select>
      </div>
      <div class="field-group">
        <span class="field-label">🌿 场地</span>
        <select class="field-select" id="terrain-select" onchange="onFieldChange()">
          <option value="none">无场地</option>
          <option value="electric">电气场地</option>
          <option value="grassy">草木场地</option>
          <option value="psychic">心灵场地</option>
          <option value="misty">薄雾场地</option>
        </select>
      </div>
      <div class="field-group">
        <span class="field-label">🔄 特殊</span>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.85rem;">
          <input type="checkbox" id="trick-room-check" onchange="onFieldChange()">
          奇异空间
        </label>
      </div>
    </div>

    <!-- 双方面板 -->
    <div class="battle-panels">

      <!-- 我方面板 -->
      <div class="battle-panel my-panel">
        <div class="panel-title">🔵 我方</div>

        <div class="form-group">
          <label class="form-label">出战宝可梦</label>
          <select class="form-select" id="my-pokemon-select" onchange="onMyPokemonChange()">
            <option value="">— 选择我方宝可梦 —</option>
          </select>
        </div>

        <div id="my-pokemon-info" style="display:none">
          <!-- 属性显示 -->
          <div id="my-stats-display" style="margin-bottom:var(--spacing-md)"></div>

          <!-- 顺风 -->
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.85rem;">
              <input type="checkbox" id="my-tailwind" onchange="runAnalysis()">
              🌬️ 我方顺风（速度×2）
            </label>
          </div>

          <!-- 异常状态 -->
          <div class="form-group">
            <label class="form-label">异常状态</label>
            <div class="status-row" id="my-status-row">
              <span class="status-badge status-burn" data-status="burn" onclick="toggleMyStatus('burn')">🔥 灼烧</span>
              <span class="status-badge status-paralysis" data-status="paralysis" onclick="toggleMyStatus('paralysis')">⚡ 麻痹</span>
              <span class="status-badge status-poison" data-status="poison" onclick="toggleMyStatus('poison')">☠️ 毒</span>
              <span class="status-badge status-sleep" data-status="sleep" onclick="toggleMyStatus('sleep')">💤 睡眠</span>
              <span class="status-badge status-freeze" data-status="freeze" onclick="toggleMyStatus('freeze')">❄️ 冰冻</span>
            </div>
          </div>

          <!-- 属性Rank变化 -->
          <div class="form-group">
            <label class="form-label">临时属性变化</label>
            <div class="rank-controls" id="my-rank-controls">
              <!-- JS渲染 -->
            </div>
          </div>
        </div>
      </div>

      <!-- 对方面板 -->
      <div class="battle-panel opp-panel">
        <div class="panel-title">🔴 对方</div>

        <div class="form-group">
          <label class="form-label">对方宝可梦（输入搜索）</label>
          <div class="search-wrapper">
            <input type="text" class="form-input" id="opp-search"
              placeholder="搜索宝可梦名称..."
              oninput="onOppSearch()"
              onblur="hideOppDropdown()"
              autocomplete="off">
            <div class="search-dropdown" id="opp-dropdown" style="display:none"></div>
          </div>
        </div>

        <div id="opp-pokemon-info" style="display:none">
          <!-- 对方属性显示 -->
          <div id="opp-stats-display" style="margin-bottom:var(--spacing-md)"></div>

          <!-- 已知对方信息 -->
          <div class="form-group">
            <label class="form-label">已知性格（可选）</label>
            <select class="form-select" id="opp-nature-select" onchange="runAnalysis()">
              <option value="">未知（枚举所有可能）</option>
              <!-- 25种性格由JS填充 -->
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">已知道具（可选）</label>
            <select class="form-select" id="opp-item-select" onchange="runAnalysis()">
              <option value="">未知（考虑讲究围巾可能）</option>
              <!-- 道具列表由JS填充 -->
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">已知特性（可选）</label>
            <select class="form-select" id="opp-ability-select" onchange="runAnalysis()">
              <option value="">未知</option>
            </select>
          </div>

          <!-- 顺风 -->
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.85rem;">
              <input type="checkbox" id="opp-tailwind" onchange="runAnalysis()">
              🌬️ 对方顺风（速度×2）
            </label>
          </div>

          <!-- 异常状态 -->
          <div class="form-group">
            <label class="form-label">对方异常状态</label>
            <div class="status-row" id="opp-status-row">
              <span class="status-badge status-burn" data-status="burn" onclick="toggleOppStatus('burn')">🔥 灼烧</span>
              <span class="status-badge status-paralysis" data-status="paralysis" onclick="toggleOppStatus('paralysis')">⚡ 麻痹</span>
              <span class="status-badge status-poison" data-status="poison" onclick="toggleOppStatus('poison')">☠️ 毒</span>
              <span class="status-badge status-sleep" data-status="sleep" onclick="toggleOppStatus('sleep')">💤 睡眠</span>
              <span class="status-badge status-freeze" data-status="freeze" onclick="toggleOppStatus('freeze')">❄️ 冰冻</span>
            </div>
          </div>

          <!-- 对方属性Rank变化 -->
          <div class="form-group">
            <label class="form-label">对方临时属性变化</label>
            <div class="rank-controls" id="opp-rank-controls"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 分析结果区 -->
    <div id="analysis-results">
      <div class="empty-state">
        <div class="icon">⚔️</div>
        <p>请选择我方宝可梦和对方宝可梦，分析结果将在此显示</p>
      </div>
    </div>

  </div><!-- /battle page -->

</main>

<!-- 保存队伍对话框 -->
<div id="save-dialog" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; display:none; align-items:center; justify-content:center;">
  <div style="background:var(--bg-card); border:1px solid var(--border-default); border-radius:var(--radius-md); padding:var(--spacing-xl); min-width:320px;">
    <h3 style="margin-bottom:var(--spacing-md);">保存队伍</h3>
    <div class="form-group">
      <label class="form-label">队伍名称</label>
      <input type="text" class="form-input" id="save-team-name" placeholder="输入队伍名称...">
    </div>
    <div style="display:flex;gap:var(--spacing-sm);justify-content:flex-end;margin-top:var(--spacing-md);">
      <button class="btn btn-secondary" onclick="hideDialog('save-dialog')">取消</button>
      <button class="btn btn-primary" onclick="saveTeam()">保存</button>
    </div>
  </div>
</div>

<!-- 宝可梦搜索弹窗 -->
<div id="pokemon-search-modal" class="modal-overlay" style="display:none" onclick="closePokemonModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span style="font-weight:700">选择宝可梦</span>
      <button class="modal-close-btn" onclick="closePokemonModal()">✕</button>
    </div>
    <input type="text" id="pokemon-modal-input" class="form-input"
      placeholder="搜索名称或拼音首字母（如 phl → 喷火龙）..."
      oninput="onPokemonModalSearch()" autocomplete="off"
      style="margin-bottom:var(--spacing-sm)">
    <div id="pokemon-modal-list" class="pokemon-modal-list"></div>
  </div>
</div>

<!-- JS 文件 -->
<script src="data/types.js"></script>
<script src="data/natures.js"></script>
<script src="data/items.js"></script>
<script src="data/moves.js"></script>
<script src="data/pokemon.js"></script>
<script src="calc/stats.js"></script>
<script src="calc/damage.js"></script>
<script src="calc/speed.js"></script>
<script src="app.js"></script>

</body>
</html>
